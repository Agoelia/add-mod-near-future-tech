name: Autoupdate

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autoupdate:
    name: Check for Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry-index
        uses: actions/checkout@v4
        with:
          path: registry-index

      - name: Checkout registry tools
        uses: actions/checkout@v4
        with:
          repository: cataclysmbn/registry
          path: registry

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run autoupdate
        working-directory: registry
        run: deno run -RW --allow-net --allow-env --allow-run=gh src/scripts/autoupdate.ts ../registry-index/manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate index files
        working-directory: registry
        run: deno run -RW --allow-run=git src/scripts/generate.ts ../registry-index/manifests ../registry-index/generated

      - name: Format registry-index files
        run: deno fmt registry-index

      - name: Check for changes
        id: check
        working-directory: registry-index
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit registry-index updates
        if: steps.check.outputs.changed == 'true'
        working-directory: registry-index
        run: |
          git add -A
          git -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: autoupdate mod versions"
          git push
